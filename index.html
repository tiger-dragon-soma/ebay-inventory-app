<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#000000">
<link rel="manifest" href="manifest.json">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="在庫登録">
<title>在庫登録</title>
<style>
  :root{
    --bg:#000000; --card:#15191e; --ink:#e8eef3; --sub:#9aabbb;
    --line:#262f38; --accent:#2dd4bf; --accent-soft:#123430;
    --field:#10161b; --ok:#4ade80; --ok-soft:#0f2b1d; --err:#f87171; --err-soft:#2c1416;
    --ph:#566370;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  body{margin:0; background:var(--bg); color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI","Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    font-size:16px; line-height:1.4; padding:12px 12px 28px;}
  .wrap{max-width:560px; margin:0 auto;}
  .nav{display:grid; grid-template-columns:1fr 1fr; gap:8px; margin-bottom:14px;}
  .nav button{padding:12px 0; border:1.5px solid var(--line); background:var(--field); color:var(--sub);
    border-radius:12px; font-size:1rem; font-weight:800; cursor:pointer; transition:all .12s;}
  .nav button.on{background:var(--accent); border-color:var(--accent); color:#04120f;}
  .hidden{display:none;}

  /* ---- register form ---- */
  .card{background:var(--card); border:1px solid var(--line); border-radius:16px; padding:14px; margin-bottom:11px;}
  .field{margin-bottom:13px;} .field:last-child{margin-bottom:0;}
  label{display:block; font-size:.72rem; color:var(--sub); margin-bottom:5px; font-weight:700;}
  label .opt{color:var(--ph); font-weight:600;}
  .inputrow{position:relative; display:flex; align-items:center;}
  .unit{position:absolute; left:11px; color:var(--sub); font-size:.85rem; font-weight:800; pointer-events:none;}
  input[type=text],input[type=number],textarea{width:100%; border:1.5px solid var(--line); background:var(--field);
    color:var(--ink); border-radius:11px; padding:11px 12px; font-size:1rem; font-weight:600; outline:none;
    transition:border-color .15s; -moz-appearance:textfield; font-family:inherit;}
  input.pad-unit{padding-left:28px;}
  input::-webkit-outer-spin-button,input::-webkit-inner-spin-button{-webkit-appearance:none;margin:0;}
  input::placeholder,textarea::placeholder{color:var(--ph); font-weight:500; opacity:1;}
  input:focus,textarea:focus{border-color:var(--accent);}
  textarea{resize:vertical; min-height:48px;}
  .locseg{display:grid; grid-template-columns:1fr 1fr 1fr; gap:7px;}
  .locseg button{border:1.5px solid var(--line); background:var(--field); color:var(--sub);
    border-radius:11px; padding:10px 2px; font-size:.86rem; font-weight:800; cursor:pointer;
    transition:all .12s; white-space:nowrap; overflow:hidden;}
  .locseg button .ic{margin-right:3px;}
  .locseg button.on{background:var(--accent); border-color:var(--accent); color:#04120f;}
  .hint{font-size:.66rem; margin-top:5px; min-height:14px; font-weight:700; word-break:break-all;}
  .hint.ok{color:var(--accent);} .hint.err{color:var(--err);}
  .submit{width:100%; margin-top:3px; padding:14px; font-size:1.02rem; font-weight:800; color:#04120f;
    background:var(--accent); border:none; border-radius:13px; cursor:pointer; transition:opacity .15s;}
  .submit:active{opacity:.7;} .submit:disabled{opacity:.5;}
  .result{margin-top:13px; padding:13px 14px; border-radius:13px; font-size:.86rem; font-weight:600;
    display:none; line-height:1.5;}
  .result.show{display:block;}
  .result.ok{background:var(--ok-soft); color:var(--ok);} .result.err{background:var(--err-soft); color:var(--err);}
  .result b{font-weight:800;}
  .spin{display:inline-block; width:13px; height:13px; border:2px solid currentColor;
    border-top-color:transparent; border-radius:50%; animation:r .7s linear infinite; vertical-align:-1px; margin-right:6px;}
  @keyframes r{to{transform:rotate(360deg);}}

  /* ---- list ---- */
  .listbar{display:flex; align-items:center; gap:8px; margin-bottom:10px;}
  .listbar input{flex:1;}
  .refresh{background:var(--field); border:1.5px solid var(--line); color:var(--sub); border-radius:11px;
    padding:11px 13px; font-size:1rem; cursor:pointer;}
  .count{font-size:.72rem; color:var(--sub); font-weight:700; margin:0 2px 10px;}
  .count b{color:var(--accent);}
  .litem{background:var(--card); border:1px solid var(--line); border-radius:12px; padding:9px 11px; margin-bottom:7px;}
  .litem.sold{opacity:.42;}
  .l1{display:flex; align-items:baseline; gap:7px;}
  .lno{font-size:.72rem; font-weight:800; color:var(--accent); flex:0 0 auto;}
  .loc{font-size:.6rem; font-weight:800; background:var(--field); color:var(--sub); border:1px solid var(--line);
    border-radius:6px; padding:1px 6px; flex:0 0 auto;}
  .lname{font-size:.9rem; font-weight:600; line-height:1.3;}
  .l2{display:flex; flex-wrap:wrap; gap:4px 12px; margin-top:5px; font-size:.72rem; color:var(--sub); font-weight:600;}
  .l2 .m{color:var(--ink);}
  .l2 a{color:var(--accent); text-decoration:none; font-weight:700;}
  .l2 a:active{opacity:.6;}
  .empty{color:var(--sub); text-align:center; padding:24px; font-size:.85rem;}
</style>
</head>
<body>
<div class="wrap">
  <div class="nav">
    <button type="button" id="navReg" class="on" onclick="showView('reg')">📝 在庫登録</button>
    <button type="button" id="navList" onclick="showView('list')">📋 在庫リスト</button>
  </div>

  <!-- ===== 登録 ===== -->
  <div id="view-reg">
    <div class="card">
      <div class="field">
        <label>在庫場所</label>
        <div class="locseg" id="loc">
          <button type="button" data-v="自宅"><span class="ic">🏠</span>自宅</button>
          <button type="button" data-v="Combase"><span class="ic">📦</span>Combase</button>
          <button type="button" data-v="Baypack"><span class="ic">🏭</span>Baypack</button>
        </div>
      </div>
      <div class="field">
        <label>eBay URL か Item ID <span class="opt">(任意・未出品なら空)</span></label>
        <div class="inputrow"><input type="text" id="item" autocomplete="off"
          placeholder="ebay.com/itm/336124398626" oninput="onItem()"></div>
        <div class="hint" id="idhint"></div>
      </div>
      <div class="field">
        <label>商品名 <span class="opt">(Item IDがあれば自動取得)</span></label>
        <div class="inputrow"><input type="text" id="name" autocomplete="off" placeholder="例: BTS VT 香水 Sealed"></div>
      </div>
      <div class="field">
        <label>仕入価格 <span class="opt">(任意・空ならPC側で自動補完)</span></label>
        <div class="inputrow"><span class="unit">¥</span>
          <input class="pad-unit" type="number" id="cost" inputmode="numeric" placeholder="10500"></div>
      </div>
      <div class="field">
        <label>仕入先URL / メルカリ商品ID <span class="opt">(任意)</span></label>
        <div class="inputrow"><input type="text" id="src" autocomplete="off"
          placeholder="メルカリは m1234… だけでOK / 他はURL" oninput="onSrc()"></div>
        <div class="hint" id="srchint"></div>
      </div>
      <div class="field">
        <label>メモ <span class="opt">(任意)</span></label>
        <textarea id="memo" rows="2"></textarea>
      </div>
    </div>
    <button class="submit" id="go" onclick="submitInv()">登録する</button>
    <div class="result" id="res"></div>
  </div>

  <!-- ===== リスト ===== -->
  <div id="view-list" class="hidden">
    <div class="listbar">
      <input type="text" id="q" placeholder="🔍 番号・商品名で絞り込み" oninput="renderList()">
      <button class="refresh" id="refresh" onclick="loadList(true)" title="更新">↻</button>
    </div>
    <div class="count" id="count"></div>
    <div id="listbody"></div>
  </div>
</div>

<script>
  const WEBAPP_URL = "https://script.google.com/macros/s/AKfycbxKc8ROBfotsN-kFpcOkwuHLicmStZpfDQpxLnnMd4TY8Na5RhCMppt81DMhLYNGbR0/exec";
  let loc = "";
  let ITEMS = null;

  /* ---------- view switch ---------- */
  function showView(v){
    document.getElementById("navReg").classList.toggle("on", v==="reg");
    document.getElementById("navList").classList.toggle("on", v==="list");
    document.getElementById("view-reg").classList.toggle("hidden", v!=="reg");
    document.getElementById("view-list").classList.toggle("hidden", v!=="list");
    if(v==="list" && ITEMS===null) loadList(false);
  }

  /* ---------- register ---------- */
  function mercariUrl(s){
    s=(s||"").trim(); if(!s) return "";
    let m=s.match(/^(m\d+)$/i); if(m) return "https://jp.mercari.com/transaction/"+m[1];
    m=s.match(/mercari\.com\/item\/(m\d+)/i); if(m) return "https://jp.mercari.com/transaction/"+m[1];
    return s;
  }
  function onItem(){
    const v=document.getElementById("item").value||"", h=document.getElementById("idhint");
    const m=v.match(/(\d{12,13})/);
    if(m){h.className="hint ok"; h.textContent="✓ ID抽出: "+m[1];}
    else if(v.trim()){h.className="hint err"; h.textContent="Item ID が見つかりません (12-13桁)";}
    else{h.className="hint"; h.textContent="";}
  }
  function onSrc(){
    const raw=document.getElementById("src").value||"", h=document.getElementById("srchint");
    const conv=mercariUrl(raw);
    if(raw.trim() && conv!==raw.trim()){h.className="hint ok"; h.textContent="→ "+conv;}
    else{h.className="hint"; h.textContent="";}
  }
  document.getElementById("loc").addEventListener("click",function(e){
    const b=e.target.closest("button"); if(!b) return;
    loc=b.getAttribute("data-v");
    for(const x of this.querySelectorAll("button")) x.classList.toggle("on", x===b);
  });
  function show(cls,html){const r=document.getElementById("res"); r.className="result show "+cls; r.innerHTML=html;}

  async function submitInv(){
    const itemRaw=document.getElementById("item").value||"";
    const idm=itemRaw.match(/(\d{12,13})/);
    const itemId=idm?idm[1]:"";
    const name=(document.getElementById("name").value||"").trim();
    if(!loc){show("err","在庫場所を選んでね"); return;}
    if(!itemId && !name){show("err","商品名か Item ID のどちらかは入れてね"); return;}
    const go=document.getElementById("go"); go.disabled=true;
    show("ok",'<span class="spin"></span>登録中…');
    try{
      const res=await fetch(WEBAPP_URL,{method:"POST",
        body:JSON.stringify({action:"inventory_add", item_id:itemId, location:loc, name:name,
          cost:document.getElementById("cost").value, sourcing_url:document.getElementById("src").value,
          memo:document.getElementById("memo").value})});
      const j=await res.json();
      go.disabled=false;
      if(j && j.success){
        const costTxt=(j.cost===""||j.cost===null)?"仕入価格は空 (PC側で補完)":"仕入¥"+Number(j.cost).toLocaleString();
        show("ok","✅ <b>#"+j.inv_no+"</b> 登録完了<br>"+(j.title?"商品: "+j.title+"<br>":"")+j.location+" / "+costTxt);
        for(const id of ["item","name","cost","src","memo"]) document.getElementById(id).value="";
        document.getElementById("idhint").textContent=""; document.getElementById("srchint").textContent="";
        loc=""; for(const x of document.querySelectorAll("#loc button")) x.classList.remove("on");
        ITEMS=null;   // list is now stale
      }else{ show("err","⚠️ "+((j&&j.error)||"登録に失敗しました")); }
    }catch(err){ go.disabled=false; show("err","⚠️ 通信エラー: "+err.message); }
  }

  /* ---------- list ---------- */
  async function loadList(force){
    const body=document.getElementById("listbody");
    if(force) ITEMS=null;
    body.innerHTML='<div class="empty"><span class="spin" style="color:var(--sub)"></span> 読み込み中…</div>';
    try{
      const res=await fetch(WEBAPP_URL,{method:"POST",body:JSON.stringify({action:"inventory_list"})});
      const j=await res.json();
      ITEMS=(j&&j.items)?j.items:[];
      ITEMS.sort((a,b)=>Number(a.inv_no)-Number(b.inv_no));
      renderList();
    }catch(err){ body.innerHTML='<div class="empty">⚠️ 読み込み失敗: '+err.message+'</div>'; }
  }
  function yen(v){ return (v===""||v===null||v===undefined)?"—":"¥"+Number(v).toLocaleString(); }
  function usd(v){ if(v===""||v===null||v===undefined) return "—"; const n=Number(v); return "$"+(Number.isInteger(n)?n:n.toFixed(2)); }
  function esc(s){ return String(s==null?"":s).replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c])); }

  function renderList(){
    if(ITEMS===null){ return; }
    const q=(document.getElementById("q").value||"").trim().toLowerCase();
    const list=ITEMS.filter(it=> !q || String(it.inv_no).includes(q) || String(it.name||"").toLowerCase().includes(q));
    const inStock=ITEMS.filter(it=>it.status!=="在庫なし").length;
    document.getElementById("count").innerHTML="在庫有り <b>"+inStock+"</b> / 全 "+ITEMS.length+" 件"+(q?"（該当 "+list.length+"）":"");
    const body=document.getElementById("listbody");
    if(!list.length){ body.innerHTML='<div class="empty">該当なし</div>'; return; }
    let h="";
    for(const it of list){
      const sold=it.status==="在庫なし";
      let idpart="—";
      if(it.item_id){
        const url=it.listing_url||("https://www.ebay.com/itm/"+it.item_id);
        idpart='<a href="'+esc(url)+'" target="_blank" rel="noopener">🔗 '+esc(it.item_id)+'</a>';
      }
      h+='<div class="litem'+(sold?' sold':'')+'">'
        +'<div class="l1"><span class="lno">#'+esc(it.inv_no)+'</span>'
        +'<span class="loc">'+esc(it.location||"—")+'</span>'
        +'<span class="lname">'+esc(it.name||"(名称なし)")+'</span></div>'
        +'<div class="l2"><span>仕入 <span class="m">'+yen(it.cost)+'</span></span>'
        +'<span>eBay <span class="m">'+usd(it.ebay_price)+'</span></span>'
        +'<span>'+idpart+'</span></div>'
        +'</div>';
    }
    body.innerHTML=h;
  }
</script>
</body>
</html>
